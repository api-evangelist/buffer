"""List of possible metrics available for a Post.

Values fall into three groups:
- **Cross-network normalized** (reactions, comments, shares, reposts, reach, impressions, views, clicks, engagementRate): Used wherever a concept maps cleanly across networks. Per-network adapters normalize their native names (e.g., Instagram `likes` → `reactions`, Twitter `retweets` → `reposts`).
- **Network-specific** (saves, follows, quotes, viewers, totalTimeWatched, likes): Real metrics that don't have a cross-network equivalent. `likes` is intentionally distinct from `reactions` on Facebook — Facebook's Graph API surfaces them separately.
- **Aggregation-only** (postCount): Meaningful only on aggregate endpoints; never emitted per-post.

Deprecated values are pre-normalization legacy or tied to features being removed. They're kept in the enum for backwards compatibility until clients migrate."""
enum PostMetricType {
  """How many people reacted to your post. Unified across networks: Instagram/Twitter `likes`, Mastodon `favorites`, etc. all map to this value."""
  reactions
  """The count of comments and replies on your post. Unified across networks (Threads `replies` maps here)."""
  comments
  """How many times your post was shared or forwarded by others."""
  shares
  """How many times your post was reposted by others. Twitter `retweets`, Mastodon `reblogs`, Threads `reposts` all normalize to this value."""
  reposts
  """The number of unique people who saw your post."""
  reach
  """How many times your post was shown on screen. May include multiple views by the same person — useful for spotting how often the content gets surfaced."""
  impressions
  """How many times your post was viewed. Used for video-style posts and on networks that report views distinctly from impressions."""
  views
  """How many times people clicked on your post."""
  clicks
  """The percentage of people who interacted with your post compared to how many saw it. Unit: percentage."""
  engagementRate
  """How many times people saved your post (Instagram, Pinterest). A strong signal that the content is worth revisiting."""
  saves
  """The number of new followers gained from this post (Instagram)."""
  follows
  """How many times your post was quoted (Threads)."""
  quotes
  """Unique viewer count for video-style posts (LinkedIn)."""
  viewers
  """Total time watched, in minutes, for video-style posts (LinkedIn)."""
  totalTimeWatched
  """The Like-reaction subcount on Facebook. Distinct from `reactions` (which is the total of all reaction types — Like, Love, Care, Haha, Wow, Sad, Angry); Facebook's Graph API reports them separately and we mirror that."""
  likes
  """The count of posts included in an aggregated response. Only meaningful on aggregate endpoints — never emitted per-post."""
  postCount
}

"""The unit representing the value of a PostMetric."""
enum PostMetricUnit {
  """An integer count (e.g. number of reactions, impressions, reach)."""
  count
  """A percentage value between 0 and 100 (e.g. engagement rate)."""
  percentage
}


aid: buffer
name: Buffer
description: Buffer is a social media scheduling and analytics platform with a GraphQL
  API for scheduling posts, managing content queues, accessing engagement metrics,
  and publishing across multiple social channels including Instagram, LinkedIn, X,
  TikTok, Facebook, Threads, Pinterest, Bluesky, YouTube, Mastodon, and Google Business
  Profiles.
